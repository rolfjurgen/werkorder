<!DOCTYPE html>
<html>
<head>
    <title>Mijn Dropbox App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        button { padding: 15px 25px; font-size: 16px; cursor: pointer; background: #0061ff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Mijn Dropbox App</h2>
    <button id="auth-button">Inloggen bij Dropbox</button>
    <div id="content"></div>

    <script>
        const DBX_APP_KEY = 'w0f0jvrhd3q50vo'; // Jouw sleutel staat hier al goed
        const dbx = new Dropbox.Dropbox({ clientId: DBX_APP_KEY });

        document.getElementById('auth-button').addEventListener('click', () => {
            const authUrl = dbx.auth.getAuthenticationUrl(window.location.href);
            window.location.href = authUrl;
        });

        // Check of we terugkomen van Dropbox login
        const accessToken = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
        if (accessToken) {
            document.getElementById('auth-button').style.display = 'none';
            document.getElementById('content').innerText = 'Je bent ingelogd!';
        }
    </script>
</body>
</html>
